<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta Especial</title>
</head>
<body style="text-align:center; margin-top:100px; font-family:Arial;">

<h1>💌</h1>

<button onclick="mostrar()">Clique no coração</button>

<div id="senha" style="display:none;">
  <p>Digite a senha:</p>
  <input id="inputSenha">
  <button onclick="verificar()">Entrar</button>
</div>

<h2 id="mensagem"></h2>

<script>
function mostrar() {
  document.getElementById("senha").style.display = "block";
}

function verificar() {
  var senha = document.getElementById("inputSenha").value;

  if (senha == "1234OBGD") {
    document.getElementById("mensagem").innerText = "Olá, se esta carta chegou em você é porque quero te falar obrigado por tudo. Você sempre será meu melhor amigo(A) 💖";
  } else {
    document.getElementById("mensagem").innerText = "Senha errada!";
  }
}
</script>

</body>
</html>
