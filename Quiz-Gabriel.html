<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Quiz Misterioso</title>
</head>

<body style="text-align:center; font-family:Arial; margin-top:100px;">

  <!-- TELA INICIAL -->
  <div id="inicio">
    <h1 style="font-size:80px;">?</h1>
    <p>Clique no botão para começar</p>
    <button onclick="comecar()">COMEÇAR</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" style="display:none;">
    <p id="pergunta"></p>

    <input id="resposta" placeholder="Digite sua resposta">
    <br><br>

    <button onclick="verificar()">Responder</button>
  </div>

  <!-- FINAL -->
  <div id="final" style="display:none;">
    <img src="IMG-20260318-WA0004.jpg" width="250">
    <h2>🎉 PARABÉNS VOCÊ PASSOU DO QUIZ!</h2>
  </div>

  <script>
    let etapa = 0;

    const perguntas = [
      "O que Gabriel faz quando está triste/desgosto?",
      "O que Gabriel faz quando está com raiva?",
      "O que Gabriel faz quando está com medo?"
    ];

    function comecar() {
      document.getElementById("inicio").style.display = "none";
      document.getElementById("quiz").style.display = "block";
      mostrarPergunta();
    }

    function mostrarPergunta() {
      document.getElementById("pergunta").innerHTML = perguntas[etapa];
      document.getElementById("resposta").value = "";
    }

    function verificar() {
      let r = document.getElementById("resposta").value
        .toLowerCase()
        .trim();

      if (etapa === 0 && r !== "bico") {
        alert("❌ Errou!");
        location.reload();
      }

      if (etapa === 1 && r !== "grita") {
        alert("❌ Errou!");
        location.reload();
      }

      if (etapa === 2 && r !== "chora" && r !== "grita") {
        alert("❌ Errou!");
        location.reload();
      }

      etapa++;

      if (etapa < perguntas.length) {
        mostrarPergunta();
      } else {
        document.getElementById("quiz").style.display = "none";
        document.getElementById("final").style.display = "block";
      }
    }
  </script>

</body>
</html>
